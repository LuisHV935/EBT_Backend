spring.application.name=proyectoFinal

# PostgreSQL
spring.datasource.url=jdbc:postgresql://dpg-d8u50ulckfvc73eop3hg-a.oregon-postgres.render.com:5432/ebtdb?sslmode=require
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
